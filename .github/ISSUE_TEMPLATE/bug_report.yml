name: "🐛 Bug report"
title: "[BUG] Краткое описание проблемы"
labels: ["bug"]
assignees: []

body:
  - type: textarea
    id: what-happened
    attributes:
      label: "🐛 Что произошло?"
      description: "Опиши проблему"
      placeholder: "Например: игра вылетает при открытии сундука"
    validations:
      required: true

  - type: input
    id: mc-version
    attributes:
      label: "🎮 Версия Minecraft"
      placeholder: "1.20.1 (Fabric / Forge)"
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: "📦 Версия мода"
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "⚙️ Как воспроизвести"
      value: |
        1. Запустить игру
        2. Сделать действие
        3. Ошибка появляется
    validations:
      required: true
